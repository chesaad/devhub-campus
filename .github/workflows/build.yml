name: build-images

# Squelette à compléter — étape 3 (build) et défi de l'étape 3 (signature cosign).
#
# Principe GitOps : la CI BUILD et PUSH une image. C'est tout.
# Elle ne touche PAS au cluster. C'est ArgoCD qui réagira au nouveau tag.

on:
  push:
    branches: ["main", "feature/**"]
    paths:
      - "services/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write          # nécessaire pour pousser sur ghcr.io
  id-token: write          # nécessaire pour la signature cosign (OIDC keyless)

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [annuaire, planning, notif]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.ref_name }}

      # Défi bonus étape 3 : scan de vulnérabilités avant signature — on ne
      # signe pas une image qu'on refuserait de déployer.
      - name: Scan image (trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"

      # Défi bonus étape 3 : signature keyless (OIDC) — pas de clé privée à gérer,
      # l'identité du run GitHub Actions fait foi (id-token: write ci-dessus).
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
