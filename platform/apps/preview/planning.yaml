# ApplicationSet preview pour planning — même correction que annuaire.yaml
# (git.branches n'existe pas ; scmProvider.github échoue sur compte
# personnel ; pullRequest.github retenu, owner+repo, pas d'organisation).

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: planning-preview
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - pullRequest:
        github:
          owner: chesaad
          repo: devhub-campus
        requeueAfterSeconds: 60
  template:
    metadata:
      name: "planning-preview-{{ .branch | replace \"/\" \"-\" }}"
      labels:
        devhub.io/env: preview
        devhub.io/service: planning
    spec:
      project: devhub
      source:
        repoURL: https://github.com/chesaad/devhub-campus.git
        targetRevision: "{{ .head_sha }}"
        path: services/planning/chart
        helm:
          valueFiles:
            - values-preview.yaml
          parameters:
            - name: ingress.host
              value: "planning-{{ .branch | replace \"/\" \"-\" }}.devhub.local"
      destination:
        server: https://kubernetes.default.svc
        namespace: "devhub-preview-{{ .branch | replace \"/\" \"-\" }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
