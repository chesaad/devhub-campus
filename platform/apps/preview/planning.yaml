# ApplicationSet preview pour planning.
# Une fois annuaire-preview.yaml fait, dupliquez en adaptant.
#
# TODO : à compléter à partir du modèle annuaire.yaml.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: planning-preview
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/chesaad/devhub-campus.git
        revision: HEAD
        branches:
          - feature/*
  template:
    metadata:
      name: planning-preview-{{branchNormalized}}
      labels:
        devhub.io/env: preview
        devhub.io/service: planning
    spec:
      project: devhub
      source:
        repoURL: https://github.com/chesaad/devhub-campus.git
        targetRevision: '{{branch}}'
        path: services/planning/chart
        helm:
          valueFiles:
            - values-preview.yaml
          parameters:
            - name: ingress.host
              value: "planning-{{branchNormalized}}.devhub.local"
      destination:
        server: https://kubernetes.default.svc
        namespace: devhub-preview-{{branchNormalized}}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
