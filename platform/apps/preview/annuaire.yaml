# ApplicationSet : annuaire — previews par branche.
#
# C'est l'étape 7. Lisez la doc avant : les generators sont nombreux et
# leur subtilités piègent.
#   Doc : https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/
#
# Deux générateurs successivement essayés et rejetés avant celui-ci :
#   1. `git` avec un champ `branches: [...]` — n'existe pas dans l'API réelle
#      (le générateur git ne connaît que directories/files).
#   2. `scmProvider.github` (scan par organisation) — échoue avec un 404 sur
#      `github/orgs/<user>/repos` : ce générateur ne fonctionne QUE pour une
#      organisation GitHub, pas pour un compte personnel (confirmé en
#      interrogeant l'API GitHub directement : /orgs/chesaad = 404,
#      /users/chesaad = 200).
# Retenu : `pullRequest.github` (owner + repo, pas d'organisation requise) —
# fonctionne sur un compte personnel, pas de token nécessaire sur un repo
# public (rate-limit non authentifié suffisant en TP). Contrepartie assumée :
# la preview se déclenche à l'ouverture d'une Pull Request, pas au simple push
# d'une branche feature/* — plus proche d'un usage réel d'équipe de toute
# façon (une preview sert à review une PR, pas une branche isolée).

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: annuaire-preview
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - pullRequest:
        github:
          owner: chesaad
          repo: devhub-campus
        requeueAfterSeconds: 60

  template:
    metadata:
      # {{ .branch }} peut contenir "/" (ex. feature/preview-demo) — non
      # valide dans un nom K8s, d'où le replace explicite via Sprig
      # (disponible grâce à goTemplate: true).
      name: "annuaire-preview-{{ .branch | replace \"/\" \"-\" }}"
      labels:
        devhub.io/env: preview
        devhub.io/service: annuaire
    spec:
      project: devhub
      source:
        repoURL: https://github.com/chesaad/devhub-campus.git
        targetRevision: "{{ .head_sha }}"
        path: services/annuaire/chart
        helm:
          valueFiles:
            - values-preview.yaml
          parameters:
            - name: ingress.host
              value: "annuaire-{{ .branch | replace \"/\" \"-\" }}.devhub.local"
      destination:
        server: https://kubernetes.default.svc
        namespace: "devhub-preview-{{ .branch | replace \"/\" \"-\" }}"
      syncPolicy:
        automated:
          prune: true       # IMPORTANT : indispensable pour nettoyer les previews
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
