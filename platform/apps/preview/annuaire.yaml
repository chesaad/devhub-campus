# ApplicationSet : annuaire — previews par branche.
#
# C'est l'étape 7. Lisez la doc avant : les generators sont nombreux et
# leur subtilités piègent.
#   Doc : https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/
#
# Deux options possibles :
#   - `git` generator (sur branches) — le plus simple, polling 3 min.
#   - `pullRequest` generator (sur PRs ouvertes) — requiert un token GitHub.
#
# Choisissez et justifiez dans RAPPORT.md.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: annuaire-preview
  namespace: argocd
spec:
  # generator choisi : git (sur branches), pas pullRequest — pas de token GitHub
  # à gérer/stocker en Secret pour ce TP, et le polling 3 min suffit pour la démo.
  generators:
    - git:
        repoURL: https://github.com/chesaad/devhub-campus.git
        revision: HEAD
        branches:
          - feature/*

  template:
    metadata:
      # {{branchNormalized}} : la variable exposée par le git generator en mode
      # `branches` — remplace déjà `/` par `-` pour rester un nom K8s valide.
      name: annuaire-preview-{{branchNormalized}}
      labels:
        devhub.io/env: preview
        devhub.io/service: annuaire
    spec:
      project: devhub
      source:
        repoURL: https://github.com/chesaad/devhub-campus.git
        targetRevision: '{{branch}}'
        path: services/annuaire/chart
        helm:
          valueFiles:
            - values-preview.yaml
          parameters:
            - name: ingress.host
              value: "annuaire-{{branchNormalized}}.devhub.local"
      destination:
        server: https://kubernetes.default.svc
        namespace: devhub-preview-{{branchNormalized}}
      syncPolicy:
        automated:
          prune: true       # IMPORTANT : indispensable pour nettoyer les previews
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
