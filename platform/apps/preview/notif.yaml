# ApplicationSet preview pour notif.
# TODO : à compléter à partir du modèle annuaire.yaml.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: notif-preview
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/chesaad/devhub-campus.git
        revision: HEAD
        branches:
          - feature/*
  template:
    metadata:
      name: notif-preview-{{branchNormalized}}
      labels:
        devhub.io/env: preview
        devhub.io/service: notif
    spec:
      project: devhub
      source:
        repoURL: https://github.com/chesaad/devhub-campus.git
        targetRevision: '{{branch}}'
        path: services/notif/chart
        helm:
          valueFiles:
            - values-preview.yaml
          parameters:
            - name: ingress.host
              value: "notif-{{branchNormalized}}.devhub.local"
      destination:
        server: https://kubernetes.default.svc
        namespace: devhub-preview-{{branchNormalized}}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
