# Root Application (pattern App of Apps).
#
# C'est la SEULE Application que vous créez à la main avec `kubectl apply`.
# Tout le reste sera créé par elle, à partir des fichiers de `platform/apps/dev/`.
#
# Référence : https://argo-cd.readthedocs.io/en/stable/operator-manual/cluster-bootstrapping/
#
# Étape 6 — à compléter.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  # le finalizer assure que `kubectl delete app root` propage la suppression
  # à toutes les Apps enfants (utile pour reset).
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devhub

  source:
    repoURL: https://github.com/chesaad/devhub-campus.git
    targetRevision: main
    # apps/dev/ ne contient QUE des manifestes Application — jamais de charge
    # applicative directe. C'est ce qui permet à `directory.recurse` de rester
    # sûr : tout fichier YAML trouvé ici doit être une Application ArgoCD.
    path: platform/apps/dev
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  # selfHeal:true — un kubectl edit sur la root doit être corrigé automatiquement,
  # c'est le point d'entrée unique de toute la plateforme.
  # prune:false — la root ne doit jamais supprimer une Application enfant sans
  # qu'on l'ait délibérément décidé : un chemin mal tapé dans un commit
  # supprimerait sinon tous les services d'un coup.
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
